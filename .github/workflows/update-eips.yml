name: Update EIP Data

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-eips
  cancel-in-progress: false

jobs:
  update-eips:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Update generated EIP data
        run: pnpm eip
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Commit changes
        id: commit
        run: |
          git add data/ submodules/
          git diff --cached --quiet && {
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          }

          git commit -m "chore: update EIP data"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push changes
        if: steps.commit.outputs.changed == 'true'
        run: git push origin HEAD:master

      - name: Mirror changes to public repo
        if: steps.commit.outputs.changed == 'true' && secrets.PUBLIC_REPO_PUSH_TOKEN != ''
        env:
          PUBLIC_REPO_PUSH_TOKEN: ${{ secrets.PUBLIC_REPO_PUSH_TOKEN }}
        run: |
          git remote add public-sync "https://x-access-token:${PUBLIC_REPO_PUSH_TOKEN}@github.com/EIPTools/eip-tools.git"
          git push public-sync HEAD:master
